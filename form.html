<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Anggota | Tech Community</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="./index.html">TECH<span>COMMUNITY</span></a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="./index.html">Home</a>
                <a class="nav-link active" href="./form.html">Pendaftaran</a>
                <a class="nav-link" href="./gallery.html">Multimedia</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4 class="mb-0">Form Registrasi Anggota</h4>
                    </div>
                    <div class="card-body p-4">
                        <form id="memberForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Nama Lengkap</label>
                                <input type="text" id="nama" class="form-control" placeholder="Masukkan nama..." required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Alamat Email</label>
                                <input type="email" id="email" class="form-control" placeholder="nama@email.com" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Bidang Minat</label>
                                <select id="minat" class="form-select">
                                    <option value="Web Development">Web Development</option>
                                    <option value="Cyber Security">Cyber Security</option>
                                    <option value="Networking">Networking (Cisco)</option>
                                    <option value="Software Architecture">Software Architecture</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Daftarkan Sekarang</button>
                        </form>
                        <div id="result" class="mt-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
