<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Tech Community</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="./index.html">TECH<span>COMMUNITY</span></a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="./index.html">Home</a>
                <a class="nav-link" href="./form.html">Pendaftaran</a>
                <a class="nav-link active" href="./gallery.html">Multimedia</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="text-center mb-5">Konten Multimedia</h2>
        
        <div class="row g-4 text-center">
            <div class="col-lg-8">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">Video Terbaru</h5>
                        <div class="ratio ratio-16x9 mt-3">
                            <iframe width="560" height="315" src="https://www.youtube.com/embed/Ujt9RSXzmFw?si=-9jfhYQUopm8ldmT" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm mb-4">
                    <img id="mainImg" src="http://www.pixelstalk.net/wp-content/uploads/2016/06/Art-Images-Manchester-United-Logo-Wallpapers.jpg" class="card-img-top" alt="Tech">
                    <div class="card-body">
                        <button onclick="changeImage()" class="btn btn-outline-primary btn-sm">Ganti Gambar</button>
                    </div>
                </div>
                
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h6 class="mb-3">Podcast Community</h6>
                        <audio id="myAudio" class="w-100 mb-3" src="Glory Glory Manchester United.mp3"></audio>
                        <button onclick="playPauseAudio()" class="btn btn-dark w-100">Play / Pause</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
